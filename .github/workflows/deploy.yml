name: Deploy to Cloudflare Pages

# Auto-deploys on every push to any branch:
#   - push to `main`  -> PRODUCTION deployment (main is the Pages production branch)
#   - push to any other branch -> a PREVIEW deployment at its own URL
# Cloudflare Pages decides production vs preview from the --branch value below;
# nothing here forces a feature branch into production.
on:
  push:
    branches: ['**']
  workflow_dispatch:

# Don't let two deploys of the same branch race each other.
concurrency:
  group: cf-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WRANGLER: npx -y wrangler@4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Resolve the D1 database id from YOUR account (creating the DB on first run),
      # then write it into wrangler.toml so the Functions bind to the real database.
      # This removes the need to ever hand-edit the database_id placeholder and is
      # what prevents "Error 8000022: Invalid database UUID".
      - name: Resolve/create D1 database and inject its id
        run: |
          set -euo pipefail
          get_id() {
            $WRANGLER d1 list --json 2>/dev/null \
              | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const a=JSON.parse(s);const m=a.find(x=>x.name==="sunstone-quotes");process.stdout.write(m&&m.uuid?m.uuid:"")}catch(e){process.stdout.write("")}})'
          }
          ID="$(get_id)"
          if [ -z "$ID" ]; then
            echo "D1 database 'sunstone-quotes' not found — creating it."
            $WRANGLER d1 create sunstone-quotes || true
            ID="$(get_id)"
          fi
          if [ -z "$ID" ]; then echo "::error::Could not resolve the D1 database id"; exit 1; fi
          echo "Using D1 database id: $ID"
          sed -i "s|^database_id = .*|database_id = \"$ID\"|" wrangler.toml
          grep '^database_id' wrangler.toml

      # Idempotent (CREATE TABLE IF NOT EXISTS) — safe to run on every deploy.
      - name: Apply D1 schema
        run: $WRANGLER d1 execute sunstone-quotes --remote --file=schema.sql

      - name: Deploy to Cloudflare Pages
        run: $WRANGLER pages deploy public --project-name=sunstone-pricing --branch="${GITHUB_REF_NAME}"

# One-time setup (does NOT belong in CI — run once, by you):
#   * GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#       CLOUDFLARE_API_TOKEN  - token with "Cloudflare Pages: Edit" + "D1: Edit"
#                               (D1 edit is needed so CI can list/create the database)
#       CLOUDFLARE_ACCOUNT_ID - your account id (Cloudflare dashboard, right sidebar)
#   * Create the Pages project once, and set the app secrets on it (they persist,
#     so CI needn't touch them):
#       npx wrangler pages project create sunstone-pricing --production-branch main
#       npx wrangler pages secret put PASSWORD        --project-name sunstone-pricing
#       npx wrangler pages secret put SESSION_SECRET  --project-name sunstone-pricing
#   The D1 database + schema are handled automatically by the job above.
